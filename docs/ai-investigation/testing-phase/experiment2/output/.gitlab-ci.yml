workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "parent_pipeline"
    - if: $CI_COMMIT_BRANCH

stages:
  - build
  - unitTest
  - lintCheck
  - healthCheck
  - push

variables:
  IMAGE_NAME: ${CI_REGISTRY_IMAGE}/go-microservice-image
  IMAGE_TAG: ${IMAGE_NAME}:${IMAGE_VERSION}-${CI_COMMIT_REF_SLUG}

build:
  stage: build
  script:
    - docker build -t ${IMAGE_TAG} .
  
unitTest:
  stage: unitTest
  image: golang:1.21-alpine
  before_script:
    - go mod download
  script:
    - go test ./...
  
lintCheck:
  stage: lintCheck
  script:
    - golangci-lint run
  
healthCheck:
  stage: healthCheck
  image: curlimages/curl:latest
  script:
    - ./scripts/health_check.sh
  needs:
    - job: "build"
  
push:
  stage: push
  script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - docker push ${IMAGE_TAG}
  needs:
    - job: "healthCheck"
  
