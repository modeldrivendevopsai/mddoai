services:
  ai-layer:
    build: ./ai-layer
    env_file:
      - path: ./ai-layer/.env
        required: false
    volumes:
      # Read-only access to the host's Claude Code credentials, so the
      # CLAUDE_CODE_OAUTH_TOKEN auto-detect fallback (~/.claude/.credentials.json)
      # has something to read — the container's own $HOME has no such file.
      - ${HOME}/.claude:/root/.claude:ro
    expose:
      - "8000"

  chat-ui-build:
    build: ./chat-ui
    volumes:
      - static-assets:/output

  caddy:
    image: caddy:2-alpine
    volumes:
      - static-assets:/usr/share/caddy
      - ./Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "8080:80"
    depends_on:
      ai-layer:
        condition: service_started
      chat-ui-build:
        condition: service_completed_successfully

volumes:
  static-assets:
