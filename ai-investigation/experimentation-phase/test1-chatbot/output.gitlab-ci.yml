stages:
  - build
  - unitTest
  - healthCheck
  - push

default:
  image:
    name: docker:latest



variables:
  IMAGE_NAME:
    ${CI_REGISTRY_IMAGE}/framework-chatbot-image

  IMAGE_TAG:
    ${IMAGE_NAME}:${IMAGE_VERSION}-${CI_COMMIT_REF_SLUG}


build:
  stage: build
  script:
    - docker build -t ${IMAGE_TAG} .


unitTest:
  stage: unitTest
  image: python:3.12-slim
  script:
    - python3 test/run_unit_tests.py


healthCheck:
  stage: healthCheck
  image: curlimages/curl:latest
  script:
    - ./scripts/health_check.sh
  needs:
  - job: build



push:
  stage: push
  script:
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_JOB_TOKEN} ${CI_REGISTRY}
    - docker push ${IMAGE_TAG}
  needs:
  - job: healthCheck



