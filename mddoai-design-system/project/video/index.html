<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>MDDOAI — Product Demo</title>
<link rel="icon" href="../assets/logo/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0a0a0a; }
  #video-root { position: fixed; inset: 0; }
</style>
</head>
<body>
  <div id="video-root" data-screen-label="t=0.0s"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="animations.jsx"></script>
  <script type="text/babel" src="scenes.jsx"></script>

  <script type="text/babel">
    function Demo() {
      return (
        <Stage width={1920} height={1080} duration={37} background="#0e0d15" persistKey="mddoai-demo">
          <TimestampLabeler />
          <TitleScene />
          <InputScene />
          <CommandScene />
          <OutputScene />
          <PipelinesScene />
          <MergeResultScene />
          <OutroScene />
        </Stage>
      );
    }
    ReactDOM.createRoot(document.getElementById('video-root')).render(<Demo />);
  </script>
</body>
</html>
