<!-- @dsCard group="Spacing" viewport="700x180" name="Elevation & glow" subtitle="Cool-tinted shadows + the brand violet glow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-page); font-family: var(--font-mono); }
  .wrap { padding: 30px 24px; display: flex; gap: 24px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .box { width: 92px; height: 64px; background: var(--surface-card); border-radius: var(--radius-md); }
  .lbl { font-size: 10px; color: var(--text-muted); }
  .glow { background: var(--brand); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xs)"></div><span class="lbl">xs</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><span class="lbl">sm</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><span class="lbl">md</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><span class="lbl">lg</span></div>
    <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><span class="lbl">xl</span></div>
    <div class="item"><div class="box glow" style="box-shadow:var(--glow-brand)"></div><span class="lbl">glow-brand</span></div>
  </div>
</body>
</html>
