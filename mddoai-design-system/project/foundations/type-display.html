<!-- @dsCard group="Type" viewport="700x180" name="Display — Space Grotesk" subtitle="Headings & hero. Tight tracking, geometric" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); }
  .wrap { padding: 22px 24px; }
  .row { display: flex; align-items: baseline; gap: 14px; }
  h1 { font-family: var(--font-display); font-weight: 700; color: var(--text-strong); letter-spacing: var(--tracking-tighter); margin: 0; line-height: var(--leading-tight); }
  .big { font-size: 52px; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 14px; display: flex; gap: 18px; }
  .sub { font-family: var(--font-display); font-weight: 500; font-size: 22px; color: var(--text-body); letter-spacing: var(--tracking-tight); margin-top: 8px; }
</style>
</head>
<body>
  <div class="wrap">
    <h1 class="big">Models to pipelines.</h1>
    <div class="sub">Space Grotesk Medium — section headings</div>
    <div class="meta"><span>Space Grotesk</span><span>400 · 500 · 600 · 700</span><span>tracking −0.03em</span></div>
  </div>
</body>
</html>
