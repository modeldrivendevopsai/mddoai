<!-- @dsCard group="Colors" viewport="700x150" name="Cool slate neutrals" subtitle="0 → 950 — the cool grey foundation" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--surface-card); }
  .wrap { display: flex; padding: 20px; }
  .sw { flex: 1; height: 96px; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw:first-child { border-radius: 8px 0 0 8px; border: 1px solid var(--border-subtle); border-right: none; }
  .sw:last-child { border-radius: 0 8px 8px 0; }
  .sw span { font-size: 10px; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--neutral-0)"><span style="color:#74748d">0</span></div>
    <div class="sw" style="background:var(--neutral-50)"><span style="color:#74748d">50</span></div>
    <div class="sw" style="background:var(--neutral-100)"><span style="color:#74748d">100</span></div>
    <div class="sw" style="background:var(--neutral-200)"><span style="color:#565569">200</span></div>
    <div class="sw" style="background:var(--neutral-300)"><span style="color:#3d3d4c">300</span></div>
    <div class="sw" style="background:var(--neutral-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--neutral-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--neutral-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--neutral-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--neutral-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--neutral-900)"><span style="color:#fff">900</span></div>
    <div class="sw" style="background:var(--neutral-950)"><span style="color:#fff">950</span></div>
  </div>
</body>
</html>
