<!-- @dsCard group="Type" viewport="700x160" name="Mono — IBM Plex Mono" subtitle="Commands, paths, version tags — first-class content" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); }
  .wrap { padding: 20px 24px; }
  .term { background: var(--surface-code); border-radius: var(--radius-md); padding: 16px 18px; font-family: var(--font-mono); font-size: 13px; line-height: 1.7; }
  .term .c { color: #c9c6e0; }
  .term .p { color: var(--violet-400); }
  .term .f { color: #7fd6a8; }
  .inline { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); margin-top: 12px; }
  .tag { display: inline-block; font-family: var(--font-mono); font-size: 11px; background: var(--brand-faint); color: var(--text-brand); padding: 2px 8px; border-radius: var(--radius-pill); border: 1px solid var(--border-brand); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="term">
      <span class="p">$</span> <span class="c">docker run --rm mddoai </span><span class="f">swarch2gitlab</span> <span class="c">input.swarch ./out</span>
    </div>
    <div class="inline">IBM Plex Mono · 400 / 500 / 600 &nbsp;&nbsp; version tag: <span class="tag">1.0.1</span></div>
  </div>
</body>
</html>
