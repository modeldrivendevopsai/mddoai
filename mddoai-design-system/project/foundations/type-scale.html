<!-- @dsCard group="Type" viewport="700x230" name="Type scale" subtitle="16px-rooted modular scale, 2xs → 5xl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; background: var(--surface-card); font-family: var(--font-display); }
  .wrap { padding: 18px 24px; display: flex; flex-direction: column; gap: 6px; }
  .row { display: flex; align-items: baseline; gap: 16px; color: var(--text-strong); }
  .row .lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-muted); width: 96px; flex: none; }
  .s5 { font-size: 44px; font-weight: 700; letter-spacing: -0.03em; }
  .s4 { font-size: 34px; font-weight: 600; letter-spacing: -0.02em; }
  .s3 { font-size: 26px; font-weight: 600; letter-spacing: -0.015em; }
  .s2 { font-size: 20px; font-weight: 500; }
  .s1 { font-size: 16px; font-weight: 500; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="row"><span class="lbl">5xl / 60</span><span class="s5">Aa</span></div>
    <div class="row"><span class="lbl">3xl / 38</span><span class="s4">Models to pipelines</span></div>
    <div class="row"><span class="lbl">xl / 24</span><span class="s3">Transformation types</span></div>
    <div class="row"><span class="lbl">lg / 20</span><span class="s2">Build from source</span></div>
    <div class="row"><span class="lbl">base / 16</span><span class="s1">Pull the image and run</span></div>
  </div>
</body>
</html>
