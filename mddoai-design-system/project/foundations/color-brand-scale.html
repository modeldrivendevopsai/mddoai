<!-- @dsCard group="Colors" viewport="700x150" name="Brand violet scale" subtitle="Primary hue — the loop. 50 → 900" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-mono); background: var(--surface-card); }
  .wrap { display: flex; padding: 20px; gap: 0; }
  .sw { flex: 1; height: 96px; border-radius: 0; display: flex; align-items: flex-end; padding: 8px; box-sizing: border-box; }
  .sw:first-child { border-radius: 8px 0 0 8px; }
  .sw:last-child { border-radius: 0 8px 8px 0; }
  .sw span { font-size: 10px; letter-spacing: 0.02em; }
</style>
</head>
<body>
  <div class="wrap">
    <div class="sw" style="background:var(--purple-50)"><span style="color:#332179">50</span></div>
    <div class="sw" style="background:var(--purple-100)"><span style="color:#332179">100</span></div>
    <div class="sw" style="background:var(--purple-200)"><span style="color:#332179">200</span></div>
    <div class="sw" style="background:var(--purple-300)"><span style="color:#2a1c5e">300</span></div>
    <div class="sw" style="background:var(--purple-400)"><span style="color:#fff">400</span></div>
    <div class="sw" style="background:var(--purple-500)"><span style="color:#fff">500</span></div>
    <div class="sw" style="background:var(--purple-600)"><span style="color:#fff">600</span></div>
    <div class="sw" style="background:var(--purple-700)"><span style="color:#fff">700</span></div>
    <div class="sw" style="background:var(--purple-800)"><span style="color:#fff">800</span></div>
    <div class="sw" style="background:var(--purple-900)"><span style="color:#fff">900</span></div>
  </div>
</body>
</html>
